server:
  port:  8012

spring:
  application:
    name: product-catalog-read-service
  kafka:
    admin:
      auto-create: true
    bootstrap-servers: localhost:9092
    
    consumer:
      group-id: product-read-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      
      # 1. WRAP THE DESERIALIZERS TO CATCH SERIALIZATION CRASHES SAFELY
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      
      properties:
        # Delegate down to the actual target deserializers underneath the error handler wrapper
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.KafkaAvroDeserializer
        #spring.deserializer.value.delegate.class: io.confluent.kafka.serializers.KafkaAvroDeserializer
        
        schema.registry.url: http://localhost:8081
        
        # 2. SWITCH OFF STRICT LOOKUP CRASHES
        # Setting this to false prevents the Confluent driver from looking up 'cdc.product_catalog.outbox.Value'.
        # It reads the message as a structural GenericRecord, which we will map inside the code.
        # Keep this true to continue using your compiled JAR class
        specific.avro.reader: true

        # Instruct Kafka to look at your explicit class mapping first
        specific.avro.reader.high.priority: true

        avro.specific.reader.map: "cdc.product_catalog.outbox.Value:com.common.avro.schemas.ProductEvent, cdc.product_catalog.outbox.ProductEvent:com.common.avro.schemas.ProductEvent"
        
        max.poll.interval.ms: 300000
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
        fetch.min.bytes: 1
        fetch.max.wait.ms: 500
        avro.use.logical.type.converters: true

    listener:
      ack-mode: manual_immediate
      concurrency: 3

  elasticsearch:
    uris: http://localhost:9200
    # username: elastic
    # password: ${ELASTIC_PASSWORD}
    connection-timeout: 5s
    socket-timeout: 60s

  # MySQL Core Datasource Layout
  datasource:
    url: jdbc:mysql://localhost:3312/product_catalog_read_remediation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLocalSessionState=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    username: appuser
    password: apppassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP Performance Tuning & Connection Pooling
    hikari:
      pool-name: HikariPool-ReadServiceRemediation
      # Maximum number of idle and active connections in the pool
      maximum-pool-size: 10
      # Minimum number of idle connections HikariCP tries to maintain
      minimum-idle: 5
      # Maximum time (ms) that a consumer thread will wait for a connection from the pool before throwing an exception
      connection-timeout: 30000
      # Maximum amount of time (ms) that a connection is allowed to sit idle in the pool
      idle-timeout: 600000
      # Maximum lifetime (ms) of a connection in the pool. Prevents connection aging.
      max-lifetime: 1800000
      # Query used to quickly validate if a connection is still alive before handed to the application
      connection-test-query: SELECT 1
      # Time (ms) a connection can be out of the pool before a leak is logged (0 means disabled). Use 20000 (20s) for debugging leaks.
      leak-detection-threshold: 0

  # JPA & Hibernate Production Optimizations
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    # 'update' is fine for development/staging, but use 'validate' in absolute production environments with flyway/liquibase scripts
    hibernate:
      ddl-auto: update 
    properties:
      hibernate:
        # Optimizes performance by executing multiple saves in batches rather than individual roundtrips
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        # Prevent resource-heavy memory leaks by skipping unnecessary comment generation
        use_sql_comments: false
        format_sql: false
    show-sql: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    '[com.productcatalog]': INFO
    '[org.springframework.web]': INFO
    '[org.hibernate.SQL]': WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"