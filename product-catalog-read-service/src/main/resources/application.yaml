server:
  port:  8012

spring:
  application:
    name: product-catalog-read-service
  kafka:
    admin:
      # Automatically creates the DLT topic if it doesn't exist locally
      auto-create: true
    consumer:
      group-id: product-read-service-group

      # Reads from the beginning if a group is new, preventing data gaps
      auto-offset-reset: earliest

      # 1. IDEMPOTENCY LAYER: Disable automated background auto-commits.
      # We manually commit offsets ONLY after data is safely acknowledged by Elasticsearch.
      enable-auto-commit: false

      # 2. CONSUMER LAG & MEMORY MANAGEMENT
      # Prevents the JVM from running out of memory during a high lag catch-up loop.
      max-poll-records: 500

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
    bootstrap-servers: localhost:9092
    properties:
      specific:
        avro:
          reader: 'true'
      schema:
        registry:
          url: http://localhost:8081

      # 3. REBALANCE & HEARTBEAT TIMINGS
      # If processing a batch takes too long, Kafka thinks the consumer is dead. 
      # We give it 5 minutes (300000ms) to safely write the 500 records into Elasticsearch.
      max:
        poll:
          interval:
            ms: 300000

      # Quick heartbeat checks to instantly detect absolute container death
      session:
        timeout:
          ms: 45000
      heartbeat:
        interval:
          ms: 15000

      # Tune TCP fetch thresholds for optimized payload ingestion speeds
      fetch:
        min:
          bytes: 1
        max:
          wait:
            ms: 500

      listner:
        # MANUAL_IMMEDIATE tells Spring to commit the offset to Kafka the exact millisecond 
        # we call acknowledgment.acknowledge() in our code.
        ack-mode: manual_immediate
        # Allows concurrent threads within the same container to process multiple partitions parallelly
        concurrency: 3

  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: ${ELASTIC_PASSWORD}
    connection-timeout: 5s
    socket-timeout: 60s

  # MySQL Core Datasource Layout
  datasource:
    url: jdbc:mysql://localhost:3311/product_catalog_read_remediation?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLocalSessionState=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true
    username: root
    password: prod_root_secure_pass_99
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP Performance Tuning & Connection Pooling
    hikari:
      pool-name: HikariPool-ReadServiceRemediation
      # Maximum number of idle and active connections in the pool
      maximum-pool-size: 10
      # Minimum number of idle connections HikariCP tries to maintain
      minimum-idle: 5
      # Maximum time (ms) that a consumer thread will wait for a connection from the pool before throwing an exception
      connection-timeout: 30000
      # Maximum amount of time (ms) that a connection is allowed to sit idle in the pool
      idle-timeout: 600000
      # Maximum lifetime (ms) of a connection in the pool. Prevents connection aging.
      max-lifetime: 1800000
      # Query used to quickly validate if a connection is still alive before handed to the application
      connection-test-query: SELECT 1
      # Time (ms) a connection can be out of the pool before a leak is logged (0 means disabled). Use 20000 (20s) for debugging leaks.
      leak-detection-threshold: 0

  # JPA & Hibernate Production Optimizations
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    # 'update' is fine for development/staging, but use 'validate' in absolute production environments with flyway/liquibase scripts
    hibernate:
      ddl-auto: update 
    properties:
      hibernate:
        # Optimizes performance by executing multiple saves in batches rather than individual roundtrips
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
        # Prevent resource-heavy memory leaks by skipping unnecessary comment generation
        use_sql_comments: false
        format_sql: false
    show-sql: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    '[com.productcatalog]': INFO
    '[org.springframework.web]': INFO
    '[org.hibernate.SQL]': WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"